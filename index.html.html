<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>World Sprint 100m — 世界短跑大賽</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080f;--gold:#f5c518;--accent:#ff3d5a;
  --text:#f0f4f8;--muted:#6b7a99;--card:#111827;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;overflow:hidden;height:100vh;width:100vw}
canvas{display:block}

/* ── OVERLAY PAGES ── */
.overlay{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,8,15,.96);animation:fadeIn .3s ease}
.overlay.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* SELECT */
#pg-select h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,11vw,96px);letter-spacing:6px;color:var(--gold);text-shadow:0 0 60px rgba(245,197,24,.3);line-height:1;text-align:center}
#pg-select .sub{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:4px;color:var(--muted);margin:6px 0 28px;text-align:center}
.hint{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:16px;text-align:center}
.hint em{color:var(--gold);font-style:normal}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:760px;width:100%;padding:0 16px}
@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr)}}

.rcard{border:1.5px solid rgba(255,255,255,.08);border-radius:14px;padding:16px 10px 12px;text-align:center;cursor:pointer;background:rgba(17,24,39,.7);transition:all .18s;position:relative;user-select:none}
.rcard:hover{border-color:rgba(245,197,24,.4);transform:translateY(-2px)}
.rcard.sel{border-color:var(--gold);background:rgba(245,197,24,.1);box-shadow:0 0 20px rgba(245,197,24,.15)}
.rcard .ck{position:absolute;top:7px;right:9px;width:17px;height:17px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:9px;color:#000;opacity:0;transform:scale(0);transition:all .18s}
.rcard.sel .ck{opacity:1;transform:scale(1)}
.av{font-size:32px;display:block;margin-bottom:4px}
.fl{font-size:16px;display:block;margin-bottom:2px}
.nm{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ct{font-size:10px;color:var(--muted)}
.pb{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);margin-top:5px;background:rgba(255,255,255,.05);padding:2px 6px;border-radius:8px;display:inline-block}

.sel-foot{display:flex;align-items:center;justify-content:space-between;max-width:760px;width:100%;padding:16px 16px 0;flex-wrap:wrap;gap:10px}
.chips{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.chip{font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid var(--gold);color:var(--gold);background:rgba(245,197,24,.08);font-family:'Share Tech Mono',monospace}

.btn-go{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;padding:10px 32px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;transition:all .18s;box-shadow:0 4px 18px rgba(255,61,90,.3)}
.btn-go:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,61,90,.45)}
.btn-go:disabled{opacity:.3;cursor:not-allowed}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:5;pointer-events:none;display:none}
#hud.show{display:block}
.hud-top{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent)}
.hud-phase{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:var(--gold)}
.hud-dist{font-family:'Share Tech Mono',monospace;font-size:13px;color:rgba(255,255,255,.8)}

.hud-lanes{position:fixed;right:12px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:4px}
.hud-lane{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.55);border-radius:8px;padding:4px 8px;border:1px solid rgba(255,255,255,.08)}
.hud-lane.lead{border-color:var(--gold)}
.hud-rank{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--muted);width:14px;text-align:center}
.hud-flag{font-size:12px}
.hud-name{font-size:10px;font-weight:700;width:44px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hud-bar-wrap{width:54px;height:5px;background:rgba(255,255,255,.12);border-radius:3px;overflow:hidden}
.hud-bar{height:100%;border-radius:3px;transition:width .2s}

.hud-cmt{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 16px;font-size:13px;font-style:italic;text-align:center;max-width:360px;pointer-events:none}
.hud-skip{position:fixed;bottom:20px;right:16px;pointer-events:all;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;padding:8px 16px;background:rgba(0,0,0,.6);color:var(--muted);border:1px solid rgba(255,255,255,.15);border-radius:8px;cursor:pointer;transition:all .18s}
.hud-skip:hover{border-color:var(--accent);color:var(--accent)}

/* RESULT */
#pg-result{gap:0}
.res-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,10vw,80px);letter-spacing:5px;color:var(--gold);text-shadow:0 0 40px rgba(245,197,24,.3);text-align:center}
.res-sub{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:3px;color:var(--muted);margin:4px 0 20px;text-align:center}

.podium{display:flex;align-items:flex-end;justify-content:center;gap:0;margin-bottom:20px}
.p-slot{flex:0 0 130px;text-align:center;display:flex;flex-direction:column;align-items:center}
.p-av{font-size:30px;margin-bottom:3px}
.p-fl{font-size:16px;margin-bottom:2px}
.p-nm{font-size:12px;font-weight:700}
.p-ct{font-size:10px;color:var(--muted);margin-bottom:4px}
.p-tm{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:6px}
.p-blk{width:100%;display:flex;align-items:center;justify-content:center;border-radius:6px 6px 0 0;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px}
.p-slot.gold   .p-blk{height:80px;background:#f5c518;color:#000}
.p-slot.silver .p-blk{height:56px;background:#b8c4cc;color:#111}
.p-slot.bronze .p-blk{height:40px;background:#cd7f32;color:#fff}

.res-list{max-width:400px;width:100%;border-radius:12px;overflow:hidden;margin-bottom:16px}
.res-row{display:flex;align-items:center;gap:10px;padding:9px 14px;background:rgba(17,24,39,.6);border-bottom:1px solid rgba(255,255,255,.04)}
.res-row:last-child{border-bottom:none}
.rk{font-family:'Bebas Neue',sans-serif;font-size:18px;width:24px;text-align:center}
.rk.g{color:var(--gold)}.rk.s{color:#b8c4cc}.rk.b{color:#cd7f32}
.ri{flex:1}.rn{font-size:13px;font-weight:700}.rc{font-size:10px;color:var(--muted)}
.rt{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted)}

.res-cmt{max-width:400px;width:100%;background:rgba(255,61,90,.08);border:1px solid rgba(255,61,90,.2);border-radius:10px;padding:12px 14px;font-size:12px;line-height:1.65;font-style:italic;margin-bottom:20px;text-align:center}
.res-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn-again{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;padding:10px 32px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;transition:all .18s}
.btn-again:hover{transform:translateY(-2px)}
.btn-resel{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;padding:10px 20px;background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,.13);border-radius:8px;cursor:pointer;transition:all .18s}
.btn-resel:hover{border-color:var(--gold);color:var(--gold)}
</style>
</head>
<body>

<!-- 3D Canvas -->
<canvas id="c"></canvas>

<!-- SELECT PAGE -->
<div class="overlay show" id="pg-select">
  <h1>WORLD SPRINT</h1>
  <p class="sub">100M FINALS · 世界短跑大賽</p>
  <p class="hint">選擇 <em>2–6</em> 位選手出賽</p>
  <div class="grid" id="runner-grid"></div>
  <div class="sel-foot">
    <div class="chips" id="chips"><span style="font-size:11px;color:var(--muted);font-family:'Share Tech Mono',monospace">尚未選擇</span></div>
    <button class="btn-go" id="btn-go" disabled onclick="startRace()">START RACE</button>
  </div>
</div>

<!-- HUD (race) -->
<div id="hud">
  <div class="hud-top">
    <div class="hud-phase" id="hud-phase">READY</div>
    <div class="hud-dist"><span id="hud-m">0</span> / 100 m</div>
  </div>
  <div class="hud-lanes" id="hud-lanes"></div>
  <div class="hud-cmt" id="hud-cmt">各就各位...</div>
  <button class="hud-skip" onclick="skipRace()">跳過 →</button>
</div>

<!-- RESULT PAGE -->
<div class="overlay" id="pg-result">
  <div class="res-title">FINISH!</div>
  <div class="res-sub" id="res-sub"></div>
  <div class="podium" id="podium"></div>
  <div class="res-list" id="res-list"></div>
  <div class="res-cmt" id="res-cmt"></div>
  <div class="res-btns">
    <button class="btn-again" onclick="raceAgain()">再賽一次</button>
    <button class="btn-resel" onclick="goSelect()">重新選角</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ═══════════════ DATA ═══════════════ */
const RUNNERS_DATA = [
  {id:0,em:'🏃🏻',nm:'陳大文',   ct:'台灣',    fl:'🇹🇼',spd:9.78,clr:0x38bdf8,skin:0xffe0bd},
  {id:1,em:'🏃🏿',nm:'Kwame',    ct:'迦納',    fl:'🇬🇭',spd:9.65,clr:0x4ade80,skin:0x3d1c02},
  {id:2,em:'🏃🏽‍♀️',nm:'María',  ct:'墨西哥',  fl:'🇲🇽',spd:9.85,clr:0xf97316,skin:0xc68642},
  {id:3,em:'🏃🏼',nm:'Lars',     ct:'瑞典',    fl:'🇸🇪',spd:9.80,clr:0xa78bfa,skin:0xffe0bd},
  {id:4,em:'🏃🏻‍♀️',nm:'Yuki',   ct:'日本',    fl:'🇯🇵',spd:9.90,clr:0xf472b6,skin:0xf5c5a3},
  {id:5,em:'🏃🏾',nm:'Amara',    ct:'塞內加爾', fl:'🇸🇳',spd:9.60,clr:0xfbbf24,skin:0x6b3a2a},
  {id:6,em:'🏃🏿‍♀️',nm:'Zola',   ct:'南非',    fl:'🇿🇦',spd:9.72,clr:0x34d399,skin:0x2d0e00},
  {id:7,em:'🏃🏽',nm:'Arjun',    ct:'印度',    fl:'🇮🇳',spd:9.82,clr:0xfb923c,skin:0xb5622b},
];
const CMTS=[
  (a,b)=>`${a} 領先！${b} 緊追不捨！`,
  (a,b)=>`${a} 超越 ${b}，半個身位差距！`,
  (a,b)=>`${b} 發動衝刺，正在縮短差距！`,
  (a,b)=>`最後直道！${a} 與 ${b} 並駕齊驅！`,
  (a,b)=>`觀眾沸騰！${a} 能守住優勢嗎？`,
  (a,b)=>`${b} 從旁道切入試圖超越 ${a}！`,
  (a,b)=>`${a} 展現驚人爆發力，${b} 追趕！`,
];

/* ═══════════════ SELECT ═══════════════ */
let selected = new Set();
(function buildGrid(){
  const g = document.getElementById('runner-grid');
  RUNNERS_DATA.forEach(r => {
    const c = document.createElement('div');
    c.className = 'rcard'; c.id = 'rc'+r.id;
    c.innerHTML = `<span class="ck">✓</span><span class="av">${r.em}</span><span class="fl">${r.fl}</span><div class="nm">${r.nm}</div><div class="ct">${r.ct}</div><span class="pb">${r.spd}s PB</span>`;
    c.onclick = () => toggleR(r.id);
    g.appendChild(c);
  });
})();
function toggleR(id){
  if(selected.has(id)){selected.delete(id);document.getElementById('rc'+id).classList.remove('sel')}
  else{if(selected.size>=6)return;selected.add(id);document.getElementById('rc'+id).classList.add('sel')}
  const ids=[...selected];
  const el=document.getElementById('chips');
  el.innerHTML = ids.length ? ids.map(i=>`<span class="chip">${RUNNERS_DATA[i].fl} ${RUNNERS_DATA[i].nm}</span>`).join('') : '<span style="font-size:11px;color:var(--muted);font-family:\'Share Tech Mono\',monospace">尚未選擇</span>';
  document.getElementById('btn-go').disabled = ids.length < 2;
}

/* ═══════════════ THREE.JS SETUP ═══════════════ */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x0a1020);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a1020, 60, 180);

const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 300);
camera.position.set(0, 8, -14);
camera.lookAt(0, 1, 20);

function resize(){
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

/* ─── LIGHTS ─── */
const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xfff4e0, 1.2);
sun.position.set(20, 40, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=0.5; sun.shadow.camera.far=200;
sun.shadow.camera.left=-80; sun.shadow.camera.right=80;
sun.shadow.camera.top=30; sun.shadow.camera.bottom=-30;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x7090ff, 0.3);
fill.position.set(-10,10,-10);
scene.add(fill);

/* ─── TRACK ─── */
const TRACK_LEN = 120;
const LANE_W = 1.4;

function buildTrack(numLanes){
  // Ground
  const gGeo = new THREE.PlaneGeometry(numLanes*LANE_W+4, TRACK_LEN+20);
  const gMat = new THREE.MeshLambertMaterial({color:0x2a5a2a});
  const ground = new THREE.Mesh(gGeo, gMat);
  ground.rotation.x = -Math.PI/2;
  ground.position.set(0,-0.01,TRACK_LEN/2-10);
  ground.receiveShadow = true;
  scene.add(ground);

  // Track surface (red/orange athletics track)
  const trackW = numLanes*LANE_W + 1;
  const tGeo = new THREE.PlaneGeometry(trackW, TRACK_LEN);
  const tMat = new THREE.MeshLambertMaterial({color:0xcc4422});
  const track = new THREE.Mesh(tGeo, tMat);
  track.rotation.x = -Math.PI/2;
  track.position.set(0,0,TRACK_LEN/2);
  track.receiveShadow = true;
  scene.add(track);

  // Lane lines
  for(let i=0;i<=numLanes;i++){
    const x = -numLanes*LANE_W/2 + i*LANE_W;
    const lGeo = new THREE.PlaneGeometry(0.06, TRACK_LEN);
    const lMat = new THREE.MeshLambertMaterial({color: i===0||i===numLanes ? 0xffffff : 0xddddbb});
    const line = new THREE.Mesh(lGeo, lMat);
    line.rotation.x = -Math.PI/2;
    line.position.set(x, 0.01, TRACK_LEN/2);
    scene.add(line);
  }

  // Finish line
  const fGeo = new THREE.PlaneGeometry(trackW, 0.5);
  const fMat = new THREE.MeshLambertMaterial({color:0xffffff});
  const finish = new THREE.Mesh(fGeo, fMat);
  finish.rotation.x = -Math.PI/2;
  finish.position.set(0, 0.015, TRACK_LEN);
  scene.add(finish);

  // Finish banner posts
  [-trackW/2-0.3, trackW/2+0.3].forEach(x=>{
    const pGeo = new THREE.CylinderGeometry(0.08,0.08,4,8);
    const pMat = new THREE.MeshLambertMaterial({color:0xffcc00});
    const post = new THREE.Mesh(pGeo, pMat);
    post.position.set(x,2,TRACK_LEN);
    scene.add(post);
  });
  // Banner rope
  const rope = new THREE.Mesh(new THREE.BoxGeometry(trackW+0.6,0.06,0.06), new THREE.MeshLambertMaterial({color:0xff2244}));
  rope.position.set(0,4,TRACK_LEN);
  scene.add(rope);

  // Distance markers every 20m
  for(let d=20;d<TRACK_LEN;d+=20){
    const mGeo = new THREE.PlaneGeometry(trackW,0.08);
    const mMat = new THREE.MeshLambertMaterial({color:0xffee88,transparent:true,opacity:0.5});
    const marker = new THREE.Mesh(mGeo,mMat);
    marker.rotation.x=-Math.PI/2; marker.position.set(0,0.012,d);
    scene.add(marker);
  }

  // Crowd stands suggestion - simple boxes on sides
  [-trackW/2-2, trackW/2+2].forEach((x,si)=>{
    const sGeo = new THREE.BoxGeometry(3, 4, TRACK_LEN*0.8);
    const sMat = new THREE.MeshLambertMaterial({color:si===0?0x1a3a6a:0x3a1a2a, transparent:true, opacity:0.7});
    const stand = new THREE.Mesh(sGeo, sMat);
    stand.position.set(x, 2, TRACK_LEN*0.45);
    scene.add(stand);
    // crowd dots
    for(let ci=0;ci<40;ci++){
      const cdot = new THREE.Mesh(new THREE.SphereGeometry(0.12,4,4), new THREE.MeshLambertMaterial({color:Math.random()*0xffffff}));
      cdot.position.set(x+(Math.random()-0.5)*2, 2.5+Math.random()*2, 5+Math.random()*(TRACK_LEN*0.8-10));
      scene.add(cdot);
    }
  });

  // Sky backdrop
  const skyGeo = new THREE.PlaneGeometry(300,80);
  const skyMat = new THREE.MeshBasicMaterial({color:0x0a2060, side:THREE.BackSide});
  const sky = new THREE.Mesh(skyGeo, skyMat);
  sky.position.set(0,20,TRACK_LEN+30);
  scene.add(sky);
}

/* ─── RUNNER MESH (articulated body) ─── */
function createRunnerMesh(data){
  const group = new THREE.Group();
  const skinColor = data.skin;
  const kitColor  = data.clr;

  const skin = new THREE.MeshLambertMaterial({color:skinColor});
  const kit  = new THREE.MeshLambertMaterial({color:kitColor});
  const dark = new THREE.MeshLambertMaterial({color:0x111111});
  const shoe = new THREE.MeshLambertMaterial({color:0x222222});
  const hair = new THREE.MeshLambertMaterial({color:data.id===3?0xf5c518:0x111111});

  // HEAD
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.18,10,8), skin);
  head.position.y = 1.75;
  head.castShadow = true;
  group.add(head);

  // Hair cap
  const cap = new THREE.Mesh(new THREE.SphereGeometry(0.185,8,6,0,Math.PI*2,0,Math.PI/2), kit);
  cap.position.y = 1.75;
  group.add(cap);

  // TORSO
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.32,0.42,0.18), kit);
  torso.position.y = 1.25;
  torso.castShadow = true;
  group.add(torso);

  // HIPS
  const hips = new THREE.Mesh(new THREE.BoxGeometry(0.28,0.18,0.16), kit);
  hips.position.y = 1.00;
  group.add(hips);

  // ARMS (pivot from shoulder)
  function makeArm(side){
    const pivot = new THREE.Group();
    pivot.position.set(side*0.20, 1.42, 0);
    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.05,0.28,6), skin);
    upper.position.y = -0.14;
    pivot.add(upper);
    const foreArmPivot = new THREE.Group();
    foreArmPivot.position.y = -0.28;
    const fore = new THREE.Mesh(new THREE.CylinderGeometry(0.045,0.04,0.24,6), skin);
    fore.position.y = -0.12;
    foreArmPivot.add(fore);
    pivot.add(foreArmPivot);
    group.add(pivot);
    return {pivot, foreArmPivot};
  }
  const lArm = makeArm(-1);
  const rArm = makeArm( 1);

  // LEGS (pivot from hip)
  function makeLeg(side){
    const pivot = new THREE.Group();
    pivot.position.set(side*0.10, 0.98, 0);
    const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.06,0.36,6), kit);
    thigh.position.y = -0.18;
    pivot.add(thigh);
    const kneePivot = new THREE.Group();
    kneePivot.position.y = -0.36;
    const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.045,0.34,6), skin);
    shin.position.y = -0.17;
    kneePivot.add(shin);
    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.07,0.22), shoe);
    foot.position.set(0,-0.35,0.06);
    kneePivot.add(foot);
    pivot.add(kneePivot);
    group.add(pivot);
    return {pivot, kneePivot};
  }
  const lLeg = makeLeg(-1);
  const rLeg = makeLeg( 1);

  group.castShadow = true;
  group.userData = {lArm,rArm,lLeg,rLeg};

  // Label sprite (flag+name)
  const canvas2 = document.createElement('canvas');
  canvas2.width=160; canvas2.height=40;
  const ctx2 = canvas2.getContext('2d');
  ctx2.fillStyle='rgba(0,0,0,0.6)';
  ctx2.roundRect(0,0,160,40,8);
  ctx2.fill();
  ctx2.font='18px serif';
  ctx2.fillText(data.fl,6,28);
  ctx2.fillStyle='#ffffff';
  ctx2.font='bold 13px sans-serif';
  ctx2.fillText(data.nm,30,26);
  const tex = new THREE.CanvasTexture(canvas2);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));
  sprite.scale.set(1.4,0.35,1);
  sprite.position.y = 2.2;
  group.add(sprite);

  return group;
}

/* ─── ANIMATE LIMBS ─── */
function animateLimbs(mesh, t, speed){
  const {lArm,rArm,lLeg,rLeg} = mesh.userData;
  const c = t * (8+speed*0.3);
  const A = 0.6 + speed*0.02;
  const B = 0.5;

  // Legs: hip pivot + knee bend
  lLeg.pivot.rotation.x      =  Math.sin(c)*A;
  lLeg.kneePivot.rotation.x  =  Math.max(0, Math.sin(c+1)*B);
  rLeg.pivot.rotation.x      = -Math.sin(c)*A;
  rLeg.kneePivot.rotation.x  =  Math.max(0, Math.sin(c-1+Math.PI)*B);

  // Arms swing opposite to legs
  lArm.pivot.rotation.x      = -Math.sin(c)*0.5;
  lArm.foreArmPivot.rotation.x = Math.max(0,Math.sin(c)*0.4);
  rArm.pivot.rotation.x      =  Math.sin(c)*0.5;
  rArm.foreArmPivot.rotation.x = Math.max(0,Math.sin(c+Math.PI)*0.4);

  // Body bob
  mesh.position.y = Math.abs(Math.sin(c*1))*0.04;
  // Slight forward lean
  mesh.rotation.x = -0.12;
}

/* ═══════════════ RACE STATE ═══════════════ */
let runners = [];
let finalOrder = [];
let raceActive = false;
let raceOver = false;
let t = 0;
let cmtTimer = 0;
let camZ = -14;

function startRace(){
  // Clear scene
  while(scene.children.length){scene.remove(scene.children[0]);}
  scene.add(ambient); scene.add(sun); scene.add(fill);

  const ids = [...selected];
  const n = ids.length;
  runners = [];
  finalOrder = [];
  raceActive = false;
  raceOver = false;
  t = 0; cmtTimer = 0; camZ = -14;

  buildTrack(n);

  ids.forEach((id,i)=>{
    const data = RUNNERS_DATA[id];
    const mesh = createRunnerMesh(data);
    const laneX = (-n/2 + i + 0.5)*LANE_W;
    mesh.position.set(laneX, 0, 0);
    scene.add(mesh);
    runners.push({
      data, mesh,
      pos: 0,
      speed: 0,
      topSpeed: (100/data.spd)*1.05,
      laneX,
      finished: false,
      finishTime: 0,
      surge: 0,
      surgeTimer: 0
    });
  });

  // HUD lanes
  const hudLanes = document.getElementById('hud-lanes');
  hudLanes.innerHTML = '';
  ids.forEach(id=>{
    const data = RUNNERS_DATA[id];
    const color = '#'+data.clr.toString(16).padStart(6,'0');
    const div = document.createElement('div');
    div.className='hud-lane'; div.id='hl'+id;
    div.innerHTML=`<span class="hud-rank" id="hr${id}">-</span><span class="hud-flag">${data.fl}</span><span class="hud-name">${data.nm}</span><div class="hud-bar-wrap"><div class="hud-bar" id="hb${id}" style="background:${color};width:0%"></div></div>`;
    hudLanes.appendChild(div);
  });

  document.getElementById('pg-select').classList.remove('show');
  document.getElementById('hud').classList.add('show');
  document.getElementById('hud-cmt').textContent='各就各位——砰！';
  document.getElementById('hud-phase').textContent='GO!';

  // Countdown then start
  setTimeout(()=>{ raceActive = true; },800);
}

function skipRace(){
  if(raceOver) return;
  // Sort remaining by speed + jitter
  const notFinished = runners.filter(r=>!r.finished);
  notFinished.sort((a,b)=>( a.data.spd+(Math.random()-.5)*.3 ) - ( b.data.spd+(Math.random()-.5)*.3 ));
  notFinished.forEach(r=>{ r.pos=100; r.finished=true; finalOrder.push(r.data.id); });
  raceOver=true;
  setTimeout(showResult,400);
}

function raceAgain(){ startRace(); }
function goSelect(){
  raceActive=false; raceOver=false;
  document.getElementById('hud').classList.remove('show');
  document.getElementById('pg-result').classList.remove('show');
  selected.clear();
  document.querySelectorAll('.rcard').forEach(c=>c.classList.remove('sel'));
  document.getElementById('chips').innerHTML='<span style="font-size:11px;color:var(--muted);font-family:\'Share Tech Mono\',monospace">尚未選擇</span>';
  document.getElementById('btn-go').disabled=true;
  document.getElementById('pg-select').classList.add('show');
}

/* ═══════════════ RESULT ═══════════════ */
function showResult(){
  document.getElementById('hud').classList.remove('show');
  document.getElementById('pg-result').classList.add('show');

  const w = RUNNERS_DATA.find(r=>r.id===finalOrder[0]);
  document.getElementById('res-sub').textContent=`${w.fl} ${w.nm} 奪得冠軍！`;

  // Podium top3
  const pod = document.getElementById('podium');
  pod.innerHTML='';
  const layout=[1,0,2], cls=['silver','gold','bronze'], mdl=['🥈','🥇','🥉'];
  layout.forEach((rank,slot)=>{
    const id=finalOrder[rank]; if(id===undefined)return;
    const r=RUNNERS_DATA.find(a=>a.id===id);
    const tm=(9.5+rank*.15+(Math.random()-.5)*.05).toFixed(2);
    const d=document.createElement('div'); d.className='p-slot '+cls[slot];
    d.innerHTML=`<div class="p-av">${r.em}</div><div class="p-fl">${r.fl}</div><div class="p-nm">${r.nm}</div><div class="p-ct">${r.ct}</div><div class="p-tm">${tm}s</div><div class="p-blk">${mdl[slot]}</div>`;
    pod.appendChild(d);
  });

  // Full list
  const list = document.getElementById('res-list');
  list.innerHTML='';
  finalOrder.forEach((id,i)=>{
    const r=RUNNERS_DATA.find(a=>a.id===id);
    const tm=(9.5+i*.15+(Math.random()-.5)*.05).toFixed(2);
    const div=document.createElement('div'); div.className='res-row';
    const rc=i===0?'g':i===1?'s':i===2?'b':'';
    div.innerHTML=`<span class="rk ${rc}">${i+1}</span><span style="font-size:16px">${r.fl} ${r.em}</span><div class="ri"><div class="rn">${r.nm}</div><div class="rc">${r.ct}</div></div><span class="rt">${tm}s</span>`;
    list.appendChild(div);
  });

  const cmts=[
    `${w.nm} 以驚人的最後衝刺奪冠，為 ${w.ct} 帶來無上榮耀！全場觀眾起立鼓掌！`,
    `${w.nm} 從中段開始加速，無人能及！${w.ct} 的旗幟在終點高高飄揚！`,
    `精彩的百米決賽！${w.nm} 憑頑強意志奪金，${w.ct} 的驕傲！`,
  ];
  document.getElementById('res-cmt').textContent=cmts[Math.floor(Math.random()*cmts.length)];
}

/* ═══════════════ GAME LOOP ═══════════════ */
let lastT = 0;
function loop(now){
  requestAnimationFrame(loop);
  const dt = Math.min((now-lastT)/1000, 0.05);
  lastT = now;

  if(raceActive && !raceOver){
    t += dt;
    cmtTimer += dt;

    let allDone = true;
    runners.forEach(r=>{
      if(r.finished) return;
      allDone = false;

      // Surge mechanic
      r.surgeTimer -= dt;
      if(r.surgeTimer<=0){
        r.surge = Math.random()<0.25 ? (Math.random()*3+1) : 0;
        r.surgeTimer = 1.5+Math.random()*2;
      }
      const baseSpeed = r.topSpeed + (Math.random()-.5)*0.8 + r.surge*0.5;
      r.speed = baseSpeed;
      r.pos = Math.min(r.pos+baseSpeed*dt, 100);
      r.mesh.position.z = r.pos * (TRACK_LEN/100);

      animateLimbs(r.mesh, t, r.speed);

      if(r.pos>=100 && !r.finished){
        r.finished=true;
        r.finishTime=t;
        finalOrder.push(r.data.id);
      }

      // Update HUD bar
      const bar=document.getElementById('hb'+r.data.id);
      if(bar) bar.style.width=(r.pos)+'%';
    });

    // Rank HUD
    const sorted=[...runners].sort((a,b)=>b.pos-a.pos);
    sorted.forEach((r,i)=>{
      const el=document.getElementById('hr'+r.data.id);
      const lane=document.getElementById('hl'+r.data.id);
      if(el) el.textContent=i+1;
      if(lane){ lane.classList.toggle('lead',i===0); }
    });

    // Leader HUD
    const leader=sorted[0];
    document.getElementById('hud-m').textContent=Math.round(leader.pos);
    const lp=leader.pos;
    document.getElementById('hud-phase').textContent=
      lp<10?'GO!':lp<50?'直道衝刺':lp<85?'最後衝刺！':'FINISH!';

    // Commentary
    if(cmtTimer>3.5 && sorted.length>=2){
      cmtTimer=0;
      const fn=CMTS[Math.floor(Math.random()*CMTS.length)];
      document.getElementById('hud-cmt').textContent=fn(sorted[0].data.nm,sorted[1].data.nm);
    }

    // Camera follow leader smoothly
    const targetZ = leader.mesh.position.z - 14;
    camZ += (targetZ-camZ)*dt*2;
    camera.position.set(0, 8, camZ);
    camera.lookAt(leader.mesh.position.x*0.3, 1, camZ+28);

    if(allDone || finalOrder.length===runners.length){
      raceOver=true; raceActive=false;
      const w=RUNNERS_DATA.find(r=>r.id===finalOrder[0]);
      document.getElementById('hud-cmt').textContent=`${w.fl} ${w.nm} 衝破終點線！恭喜！`;
      document.getElementById('hud-phase').textContent='FINISH!';
      setTimeout(showResult,1500);
    }
  }

  renderer.render(scene, camera);
}
requestAnimationFrame(loop);
</script>
